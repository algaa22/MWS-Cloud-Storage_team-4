services:
  app:
    image: cloud-storage-app:latest
    container_name: cloud-storage-app
    env_file:
      - .env
    ports:
      - "8080:8080" # HTTP
      - "8443:8443" # HTTPS
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      notification-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/health | grep -q '200' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cloud-network
    volumes:
      - ./src/main/resources/application.yml:/app/resources/application.yml

  notification-service:
    build: ../MWS-Cloud-Storage_notification
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: alg.aaa.2212@gmail.com
      SPRING_MAIL_PASSWORD: cjacjzbeswyplztj
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    networks:
      - cloud-network

  postgres:
    image: postgres:18.0
    container_name: cloud-storage-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    #    volumes:
    # TODO: stream?
    #      - postgres-stream:/var/lib/postgresql/stream
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: cloud-storage-seaweed
    environment:
      - WEED_S3_KEY=${S3_ACCESS_KEY}
      - WEED_S3_SECRET=${S3_SECRET_KEY}
    command: >
      server -dir="/data"
      -s3 -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json
      -master.port=9333 
      -volume.port=8080
      -filer.port=8888
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Master Console / API
      - "8888:8888" # Filer UI
    healthcheck:
      test: [ "CMD-SHELL", "curl -I http://localhost:8333/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network
    volumes:
      - seaweed-data:/data
      - ./etc/seaweedfs:/etc/seaweedfs:ro

  av-redis:
    image: redis:7-alpine
    container_name: av_redis
    ports:
      - "6379:6379"

  clamav:
    image: clamav/clamav:latest
    container_name: clamav
    ports:
      - "3310:3310"

volumes:
  postgres-data:
  file-storage:
  seaweed-data:

networks:
  cloud-network:
    driver: bridge

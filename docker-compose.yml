services:
  app:
    image: cloud-storage-app:latest
    container_name: cloud-storage-app
    ports:
      - "8080:8080" # HTTP
      - "8443:8443" # HTTPS
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      notification-service:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/cloud_storage_db
      DB_USERNAME: postgres
      DB_PASSWORD: super_secret_password_123
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      S3_URL: ${S3_URL}
      S3_USERNAME: ${S3_USERNAME}
      S3_PASSWORD: ${S3_PASSWORD}
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
    networks:
      - cloud-network

  notification-service:
    build: ../MWS-Cloud-Storage_notification
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: alg.aaa.2212@gmail.com
      SPRING_MAIL_PASSWORD: cjacjzbeswyplztj
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    networks:
      - cloud-network

  postgres:
    image: postgres:18.0
    container_name: cloud-storage-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    #    volumes:
    # TODO: stream?
    #      - postgres-stream:/var/lib/postgresql/stream
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: cloud-storage-seaweed
    environment:
      - WEED_S3_KEY=${S3_ACCESS_KEY}
      - WEED_S3_SECRET=${S3_SECRET_KEY}
    command: >
      server -dir="/data"
      -s3 -s3.port=8333 
      -master.port=9333 
      -volume.port=8080
      -filer.port=8888
    ports:
      - "8333:8333" # S3 API
      - "9333:9333" # Master Console / API
      - "8888:8888" # Filer UI
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8333/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network
    volumes:
      - seaweed-data:/data

volumes:
  postgres-data:
  file-storage:
  seaweed-data:

networks:
  cloud-network:
    driver: bridge

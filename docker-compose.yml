services:
  app:
    image: cloud-storage-app:latest
    container_name: cloud-storage-app
    platform: linux/arm64
    restart: on-failure
    env_file:
      - .env
    ports:
      - "8080:8080"
      - "8443:8443"

    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
      av-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notification-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/health | grep -q '200' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - cloud-network
    volumes:
      - ./src/main/resources/application.yml:/app/resources/application.yml
      - ./ssl:/app/ssl:ro
    environment:
      - ANTIVIRUS_ENABLED=false
      - SPRING_RABBITMQ_HOST=cloud-storage-mq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_DATA_REDIS_HOST=av_redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_JACKSON_SERIALIZATION_WRITE_DATES_AS_TIMESTAMPS=false


  notification-service:
    build: ../MWS-Cloud-Storage_notification
    container_name: notification-service
    platform: linux/arm64
    ports:
      - "8082:8082"
    environment:
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${NOTIFICATION_MAIL}
      SPRING_MAIL_PASSWORD: ${NOTIFICATION_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    networks:
      - cloud-network

  postgres:
    image: postgres:17-alpine
    container_name: cloud-storage-db
    platform: linux/arm64
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

  seaweedfs:
    image: chrislusf/seaweedfs:3.70
    container_name: cloud-storage-seaweed
    platform: linux/arm64
    user: root
    environment:
      - WEED_S3_KEY=${S3_ACCESS_KEY}
      - WEED_S3_SECRET=${S3_SECRET_KEY}
    command: >
      server -dir="/data"
      -s3 -s3.port=8333
      -s3.config=/etc/seaweedfs/s3.json.example
      -master.port=9333 
      -volume.port=8080
      -filer.port=8888
      -s3.cert.file=/ssl/server.crt
      -s3.key.file=/ssl/server.key
    ports:
      - "8333:8333"
      - "9333:9333"
      - "8888:8888"
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -s https://127.0.0.1:8443/actuator/health | grep -q UP" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - cloud-network
    volumes:
      - seaweed-data:/data
      - ./etc/seaweedfs:/etc/seaweedfs:ro
      - ./ssl:/ssl:ro

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cloud-storage-mq
    platform: linux/arm64
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloud-network

  av-redis:
    image: redis:7-alpine
    container_name: av_redis
    platform: linux/arm64
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cloud-network

  # clamav:
  #   image: clamav/clamav:1.4.2_base
  #   container_name: clamav
  #   platform: linux/arm64
  #   expose:
  #     - "3310"
  #   healthcheck:
  #     test: [ "CMD-SHELL", "echo PING | nc -w 2 localhost 3310 | grep -q PONG" ]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 60s
  #   networks:
  #     - cloud-network

volumes:
  postgres-data:
  file-storage:
  seaweed-data:

networks:
  cloud-network:
    driver: bridge
spring:
  main:
    web-application-type: none

  application:
    name: cloud-storage-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health"

  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

    distribution:
      percentiles-histogram:
        http.server.requests: true
        storage.operation.duration: true
        storage.payload.size.bytes: true
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s
        storage.operation.duration: 100ms, 500ms, 1s, 5s, 10s
        storage.payload.size.bytes: 102400, 10485760, 104857600, 524288000, 10485760000

jackson:
  max-nesting-depth: 32
  max-string-length: 1048576 # 1 mb
  max-number-length: 1000

netty:
  enable-logging: false
  enable-https: true
  https-redirect: true
  http-port: 8080
  https-port: 8443
  boss-threads: 1
  worker-threads: 4
  idle-timeout-sec: 60

  start:
    timeout-sec: 5

  shutdown:
    quiet-period-sec: 2
    timeout-sec: 15

cors:
  access-control:
    allow-origin: "http://localhost:5173"
    allow-credentials: true
    max-age: 3600

antivirus:
  enabled: true

  rabbitmq:
    retry:
      max-attempts: 3
      initial-interval-ms: 1
      multiplier: 2.0
      max-interval-ms: 10

    exchanges:
      tasks: "antivirus.tasks.direct"
      results: "antivirus.results.direct"

    queues:
      results: "antivirus.results.queue"

    routing-keys:
      tasks: "scan.task.v1"
      results: "scan.result.v1"

storage:
  s3:
    url: ${S3_URL}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    region: ${S3_REGION:eu-central-1}
    user-data-bucket:
      name: ${S3_BUCKET_NAME:user-data}
    limits:
      min-file-part-size: 5242880 # 5mb
      max-file-part-size: 33554432 # 32mb
      max-parts-num: 10000

  rest:
    max-aggregated-content-length: 1048576 # 1mb
    file-download-chunk-size: 65536 # 64 kb

  auth:
    access-token-expiration-sec: 900 # 15 min
    refresh-token-expiration-sec: 2592000 # 30 days
    jwt-secret-key: ${JWT_SECRET_KEY}

  quotas:
    default-storage-limit: 10737418240

  state-machine:
    max-retry-count: 3
    file-throttled-update-interval-sec: 15

  health-check:
    check-interval-seconds: 10
    db-timeout-seconds: 2
    s3-timeout-seconds: 2
    min-free-memory-percent: 0.10

  failsafe-retry:
    max-attempts: 3
    delay-factor: 2.0
    first-delay: 200ms
    max-delay: 1s
    jitter: 0.1

  trash:
    retention-days: 30

  scheduling:
    page-size: 100

    stale-time-min:
      file: 60
      upload: 45
      scan: 15

    dangerous-deletion-time-days: 30

    cron:
      stale-scans: "0 */5 * * * *"
      stale-file-cleanup: "0 0 1 * * *"
      stale-upload-cleanup: "0 0 2 * * *"
      trash-cleanup: "0 0 3 * * *"
      check-tariff: "0 0 4 * * *"
      quota-sync: "0 0 5 * * *"
      dangerous-file-cleanup: "0 0 6 * * *"

notification:
  tariff:
    days-before-expiry: [ 7, 3, 1 ]

  full-threshold: 0.95
  almost-full-threshold: 0.75

  service:
    url: http://localhost:8082
spring:
  application:
    name: cloud-storage-backend-test
  flyway:
    enabled: true
    locations: classpath:db/migration

netty:
  enable-https: false
  http-port: 8081
  worker-threads: 2

storage:
  failsafe-retry:
    max-attempts: 1
  s3:
    url: http://localhost:9000
    access-key: test-key
    secret-key: test-secret
    region: eu-central-1
    user-data-bucket:
      name: test-bucket